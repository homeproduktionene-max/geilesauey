name: Build C++20 (VS2022)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-2022

    strategy:
      matrix:
        configuration: [Release]
        platform: [x64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      # NuGet Cache
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.nuget/packages
            **/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.config') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      # NuGet Restore
      - name: Restore NuGet packages
        run: nuget restore src/ext-cs2-skin-changer.sln

      # OpenSSL-Pfad ermitteln (openssl-native NuGet-Paket hat keine MSBuild-Integration)
      - name: Locate OpenSSL
        run: |
          $candidates = @(
            "C:\Program Files\OpenSSL-Win64",
            "C:\Program Files\OpenSSL",
            "C:\OpenSSL-Win64"
          )
          $found = $candidates | Where-Object { Test-Path "$_\include\openssl\evp.h" } | Select-Object -First 1
          if (-not $found) {
            choco install openssl --yes --no-progress
            $found = "C:\Program Files\OpenSSL-Win64"
          }
          echo "OPENSSL_ROOT=$found" >> $env:GITHUB_ENV

      # Build
      - name: Build solution
        run: |
          msbuild src/ext-cs2-skin-changer.sln `
            /p:Configuration=${{ matrix.configuration }} `
            /p:Platform=${{ matrix.platform }} `
            /p:AdditionalIncludeDirectories="$env:OPENSSL_ROOT\include" `
            /p:AdditionalLibraryDirectories="$env:OPENSSL_ROOT\lib" `
            /m `
            /v:minimal

      # Zeige was gebaut wurde (Debug-Hilfe)
      - name: List build output
        run: Get-ChildItem -Recurse -Path src -Include *.exe,*.dll | Select-Object FullName,Length

      # Upload EXE + DLL
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ext-cs2-skin-changer-${{ matrix.platform }}-${{ matrix.configuration }}
          path: |
            **/x64/Release/*.exe
            **/x64/Release/*.dll
          if-no-files-found: error
          retention-days: 14
